# ============================================
# ClusterRoles
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: security-auditor
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
# ============================================
# Roles (в namespace)
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-engineer
  namespace: sales-dev
rules:
- apiGroups: ["", "apps", "extensions", "batch"]
  resources: ["deployments", "replicasets", "pods", "services", "ingresses", "configmaps", "jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods/log", "pods/exec"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---